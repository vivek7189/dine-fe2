appId: com.dineopen.pos
productName: DineOpen POS
directories:
  output: dist-electron
files:
  - out/**/*
  - electron/**/*
  - package.json
extraMetadata:
  main: electron/main.js

publish:
  provider: github

win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.business
  identity: null
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target: AppImage
  category: Office
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
