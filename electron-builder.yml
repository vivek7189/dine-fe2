appId: com.dineopen.pos
productName: DineOpen POS
directories:
  output: dist-electron
files:
  - out/**/*
  - electron/**/*
  - package.json
extraMetadata:
  main: electron/main.js

publish:
  provider: github
  owner: kevinjane71
  repo: dine-frontend

win:
  icon: electron/icons/icon.ico
  target:
    - nsis
mac:
  icon: electron/icons/icon.icns
  target: dmg
  category: public.app-category.business
  identity: null
  artifactName: "${productName}-${version}-${arch}.${ext}"
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target: AppImage
  category: Office
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
