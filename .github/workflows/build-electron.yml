name: Build Electron App (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: https://dine-be2-phi.vercel.app

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Set package.json version
        shell: bash
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        shell: bash
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Next.js static export for Electron
        run: node scripts/build-electron.js

      - name: Build Windows Electron app
        shell: bash
        run: npx electron-builder --config electron-builder.yml --win

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-v${{ steps.version.outputs.version }}
          path: |
            dist-electron/*Setup*.exe
            dist-electron/*.exe.blockmap
            dist-electron/latest.yml
          retention-days: 30
