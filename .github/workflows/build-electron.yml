name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: boolean

env:
  NEXT_PUBLIC_API_URL: https://dine-be2-phi.vercel.app

jobs:
  build-electron:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: ''
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Set package.json version
        shell: bash
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        shell: bash
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Next.js static export for Electron
        run: node scripts/build-electron.js

      - name: Build Electron app and publish to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            npx electron-builder --config electron-builder.yml --publish always --${{ matrix.platform }} --${{ matrix.arch }}
          else
            npx electron-builder --config electron-builder.yml --publish always --${{ matrix.platform }}
          fi
