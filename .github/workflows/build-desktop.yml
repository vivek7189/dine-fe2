name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - macos
          - both

env:
  NEXT_PUBLIC_API_URL: https://dine-backend-lake.vercel.app

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'both' }}
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Windows MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: DineOpen-POS-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload Windows EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: DineOpen-POS-Windows-EXE
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-macos:
    if: ${{ github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'both' }}
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: DineOpen-POS-macOS-DMG
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30
