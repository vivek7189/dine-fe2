name: Build Desktop App

on:
  # Automatic: push a tag like v1.1.0 to trigger
  push:
    tags:
      - 'v*'
  # Manual: can still trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: boolean

env:
  NEXT_PUBLIC_API_URL: https://dine-backend-lake.vercel.app

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag or config
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag push: extract version from tag (v1.1.0 → 1.1.0)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Manual trigger: read from tauri.conf.json
            VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Update version in config files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i 's/"version": "[^"]*"/"version": "'$VERSION'"/' src-tauri/tauri.conf.json
          sed -i '0,/^version = "[^"]*"/s//version = "'$VERSION'"/' src-tauri/Cargo.toml
          echo "Updated to v$VERSION"

      - name: Commit version bump (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.event.repository.default_branch }}
          git checkout ${{ github.event.repository.default_branch }}
          git pull origin ${{ github.event.repository.default_branch }}
          VERSION="${{ steps.version.outputs.version }}"
          sed -i 's/"version": "[^"]*"/"version": "'$VERSION'"/' src-tauri/tauri.conf.json
          sed -i '0,/^version = "[^"]*"/s//version = "'$VERSION'"/' src-tauri/Cargo.toml
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: bump desktop app version to v$VERSION" && git push origin ${{ github.event.repository.default_branch }})

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const isDraft = '${{ github.event.inputs.draft }}' === 'true' || '${{ github.ref_type }}' === 'tag';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `DineOpen POS v${version}`,
              body: 'Desktop app release',
              draft: isDraft,
              prerelease: false
            });
            return data.id;

  build-tauri:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}
